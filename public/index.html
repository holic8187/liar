<!-- public/index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양세찬 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🤪 양세찬 게임 🤪</h1>

        <div id="login-screen">
            <input type="text" id="nicknameInput" placeholder="닉네임 입력">
            <input type="text" id="roomCodeInput" placeholder="방 코드-인원수 (예: ROOM1-5)">
            <button id="joinBtn">입장 / 방 생성</button>
            <p class="info-text">최소 2명 이상, 플레이 인원수를 꼭 적어주세요.</p>
        </div>

        <div id="waiting-screen" class="hidden">
             <h2>대기 중... (<span id="currentPlayers">0</span>/<span id="totalPlayers">0</span>)</h2>
             <p>방 코드: <span id="currentRoomCode"></span></p>
             <ul id="waiting-player-list"></ul>
             <div id="system-message-area-waiting"></div>
        </div>

        <!-- === [추가] 단어 입력 화면 === -->
        <div id="word-input-screen" class="hidden">
            <h2>단어 입력 단계</h2>
            <p>주제: <span id="input-topic" class="highlight"></span></p>
            <p>'<span id="next-player-nickname" class="highlight"></span>'님의 단어를 입력해주세요.</p>
            <input type="text" id="wordInput" placeholder="단어 입력 (예: 사과)">
            <button id="submitWordBtn">단어 제출</button>
        </div>
        <!-- ============================ -->

        <div id="game-screen" class="hidden">
            <div class="header-info">
                방 코드: <span id="gameRoomCode"></span> | 내 닉네임: <span id="myNickname"></span>
            </div>
            
            <div id="system-message-area-game"></div>

            <div class="topic-info">
                <h2>주제: <span id="game-topic" class="highlight"></span></h2>
            </div>

            <!-- === [수정] 다른 사람 단어 목록 영역 === -->
            <div id="others-words-area">
                <h3>다른 플레이어의 단어</h3>
                <ul id="others-words-list" class="word-list"></ul>
            </div>
            <!-- ==================================== -->

            <div class="controls">
                <!-- === [추가] 정답 확인 버튼 === -->
                <button id="checkAnswerBtn" class="action-btn">내 단어 정답 확인 (클릭 시 공개)</button>
                <!-- ============================ -->
                <button id="endGameBtn" class="hidden action-btn host-only">게임 종료 (전체 정답 공개)</button>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <div class="result-content">
                <h2 id="winner-title">게임 결과</h2>
                <ul id="final-words-list" class="word-list"></ul>
                <button id="restartBtn">대기실로 돌아가기</button>
            </div>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
